<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <meta
      name="description"
      content="By-Bookey — high-end fashion design. Exploring form, texture, and the art of tailoring."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <title>By-Bookey — Fashion Design Studio</title>
  </head>
  <body>
    <div id="root"></div>

    <!--
      Hidden static form so Netlify's build bot registers "chatbot-queries".
      The chat widget posts to it via fetch; configure the destination inbox
      in Netlify: Forms -> chatbot-queries -> Notifications -> Email.
    -->
    <form name="chatbot-queries" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="topic" />
      <textarea name="message"></textarea>
      <input type="text" name="page" />
      <input type="text" name="bot-field" />
    </form>
    <form name="newsletter" netlify hidden>
      <input type="email" name="email" />
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
